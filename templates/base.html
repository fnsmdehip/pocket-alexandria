<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pocket Alexandria{% endblock %} - The Hidden Digital Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">
                <span class="logo-icon">&#9765;</span>
                <span class="logo-text">Pocket<br>Alexandria</span>
            </h1>
            <p class="logo-subtitle">The Hidden Digital Library</p>
        </div>

        <div class="sidebar-search">
            <form action="/search" method="GET">
                <input type="text" name="q" placeholder="Search the library..." value="{{ request.args.get('q', '') }}" autocomplete="off">
            </form>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <span class="nav-icon">&#9733;</span> Home
            </a>
            <a href="/browse" class="nav-item {% if '/browse' in request.path %}active{% endif %}">
                <span class="nav-icon">&#9776;</span> Browse
            </a>
            <a href="/search" class="nav-item {% if '/search' in request.path %}active{% endif %}">
                <span class="nav-icon">&#8981;</span> Search
            </a>
            <a href="/quotes" class="nav-item {% if '/quotes' in request.path %}active{% endif %}">
                <span class="nav-icon">&#10077;</span> Quotes
            </a>
        </nav>

        <div class="sidebar-categories">
            <h3>Categories</h3>
            {% for cat in categories|default([]) %}
            <a href="/browse/{{ cat.category|urlencode }}" class="category-link {% if current_category == cat.category %}active{% endif %}">
                {{ cat.category }} <span class="count">{{ cat.count }}</span>
            </a>
            {% endfor %}
        </div>
    </nav>

    <main class="content" id="content">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
